<!DOCTYPE html>
<html>
<head>
    <title>CatPlushie AI Dashboard</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
</head>
<body>
    <h1>CatPlushie Neural Brain</h1>
    <div id="ton-connect"></div> <button onclick="stakeTokens()">Stake 0.5 TON</button>

    <script>
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://ваша-ссылка-на-проект.replit.app/static/tonconnect-manifest.json',
            buttonRootId: 'ton-connect'
        });

        async function stakeTokens() {
            // Опкод для Stake из вашего Tact-контракта
            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 600,
                messages: [{
                    address: 'EQDiH9R1w_hy7zMzs-FHNjLWkKGOjYV_SFTiLCTnONEI5f2c', // Адрес контракта
                    amount: '500000000', // 0.5 TON в nanoTON
                }]
            };
            await tonConnectUI.sendTransaction(transaction);
        }
    </script>
</body>
</html>
