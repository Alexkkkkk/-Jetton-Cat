name: Neural Deploy Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      # ИИ-ШАГ: Валидация перед деплоем
      - name: Validate Neural Config
        run: |
          echo "🤖 Запуск аудита нейро-конфигурации..."
          # Скрипт проверки: если конфиг некорректен, деплой не начнется
          node -e "const cfg = require('./contract_config.json'); if(!cfg.ai_neural_parameters) process.exit(1);"

      - name: Compile Tact Contract
        run: npx blueprint build

      - name: Deploy to Network
        env:
          MNEMONIC: ${{ secrets.MNEMONIC }}
          TONCENTER_API_KEY: ${{ secrets.TONCENTER_API_KEY }}
          NETWORK_TYPE: mainnet
        run: npx blueprint run --no-interaction

      # ИИ-ШАГ: Уведомление в Telegram о завершении
      - name: AI-Notification
        if: always()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TG_CHAT_ID }} \
          -d text="🚀 *Neural Deploy Status*: ${{ job.status }}%0A%0AВерсия: 1.0.0-NEURAL%0AСеть: Mainnet" \
          -d parse_mode=Markdown
